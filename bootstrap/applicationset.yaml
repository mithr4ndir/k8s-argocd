---
# Bootstrap resource — apply once manually:
#   kubectl apply -f bootstrap/applicationset.yaml
#
# This ApplicationSet auto-discovers directories under environments/
# and creates an ArgoCD Application for each one.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: environments-applicationset
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/mithr4ndir/k8s-argocd.git
        revision: HEAD
        directories:
          - path: environments/*
  template:
    metadata:
      name: "{{path.basename}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/mithr4ndir/k8s-argocd.git
        targetRevision: HEAD
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{path.basename}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - SkipDryRunOnMissingResource=true
          - ServerSideApply=true

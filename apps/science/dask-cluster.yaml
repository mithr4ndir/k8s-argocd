---
apiVersion: kubernetes.dask.org/v1
kind: DaskCluster
metadata:
  name: lsdb-cluster
  namespace: science
spec:
  worker:
    replicas: 1
    spec:
      containers:
        - name: worker
          image: ghcr.io/cwladino/lsdb-dask:latest
          args:
            - dask-worker
            - --name
            - $(DASK_WORKER_NAME)
            - --dashboard
            - --dashboard-address
            - "8788"
          ports:
            - name: http-dashboard
              containerPort: 8788
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "2"
              memory: 4Gi
          env:
            - name: DASK_WORKER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: hats-catalogs
              mountPath: /data/catalogs
      volumes:
        - name: hats-catalogs
          persistentVolumeClaim:
            claimName: hats-catalogs
  scheduler:
    spec:
      containers:
        - name: scheduler
          image: ghcr.io/cwladino/lsdb-dask:latest
          args:
            - dask-scheduler
          ports:
            - name: tcp-comm
              containerPort: 8786
              protocol: TCP
            - name: http-dashboard
              containerPort: 8787
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: 6Gi
            limits:
              cpu: "2"
              memory: 6Gi
          volumeMounts:
            - name: hats-catalogs
              mountPath: /data/catalogs
      volumes:
        - name: hats-catalogs
          persistentVolumeClaim:
            claimName: hats-catalogs
    service:
      type: ClusterIP
      selector:
        dask.org/cluster-name: lsdb-cluster
        dask.org/component: scheduler
      ports:
        - name: tcp-comm
          port: 8786
          targetPort: tcp-comm
          protocol: TCP
        - name: http-dashboard
          port: 8787
          targetPort: http-dashboard
          protocol: TCP

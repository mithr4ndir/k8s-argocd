---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: dashboard
  labels:
    app.kubernetes.io/name: homepage
    app.kubernetes.io/instance: homepage
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.1.228
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: homepage
    app.kubernetes.io/instance: homepage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: dashboard
  labels:
    app.kubernetes.io/name: homepage
    app.kubernetes.io/instance: homepage
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
      app.kubernetes.io/instance: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
        app.kubernetes.io/instance: homepage
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: copy-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /config-source/services.yaml /app/config/services.yaml
              cp /config-source/settings.yaml /app/config/settings.yaml
              cp /config-source/widgets.yaml /app/config/widgets.yaml
              cp /config-source/bookmarks.yaml /app/config/bookmarks.yaml
              cp /config-source/kubernetes.yaml /app/config/kubernetes.yaml
              cp /config-source/docker.yaml /app/config/docker.yaml
              cp /config-source/custom.css /app/config/custom.css
              cp /config-source/custom.js /app/config/custom.js
              chown -R 1000:1000 /app/config
          volumeMounts:
            - name: config-source
              mountPath: /config-source
              readOnly: true
            - name: config
              mountPath: /app/config
      containers:
        - name: main
          image: ghcr.io/gethomepage/homepage:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: homepage-api-keys
          env:
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "$(MY_POD_IP):3000,192.168.1.228:3000,192.168.1.228,homepage.quasarlab.local,localhost"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /api/healthcheck
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: 3000
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/healthcheck
              port: 3000
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        - name: config-source
          configMap:
            name: homepage
        - name: config
          emptyDir: {}

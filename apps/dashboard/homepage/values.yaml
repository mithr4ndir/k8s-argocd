controllers:
  main:
    type: deployment
    replicas: 1
    pod:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    containers:
      main:
        image:
          repository: ghcr.io/gethomepage/homepage
          tag: latest
          pullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        env:
          HOMEPAGE_ALLOWED_HOSTS: "192.168.1.228,homepage.quasarlab.local,localhost"
        ports:
          - name: http
            containerPort: 3000
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet: { path: /api/healthcheck, port: 3000 }
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 30
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet: { path: /api/healthcheck, port: 3000 }
              periodSeconds: 15
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet: { path: /api/healthcheck, port: 3000 }
              periodSeconds: 5

serviceAccount:
  create: false

service:
  main:
    controller: main
    type: LoadBalancer
    loadBalancerIP: 192.168.1.228
    ports:
      http:
        port: 3000
        targetPort: http

persistence:
  config-services:
    enabled: true
    type: configMap
    name: homepage
    globalMounts:
      - path: /app/config/services.yaml
        subPath: services.yaml
        readOnly: true
  config-settings:
    enabled: true
    type: configMap
    name: homepage
    globalMounts:
      - path: /app/config/settings.yaml
        subPath: settings.yaml
        readOnly: true
  config-widgets:
    enabled: true
    type: configMap
    name: homepage
    globalMounts:
      - path: /app/config/widgets.yaml
        subPath: widgets.yaml
        readOnly: true
  config-bookmarks:
    enabled: true
    type: configMap
    name: homepage
    globalMounts:
      - path: /app/config/bookmarks.yaml
        subPath: bookmarks.yaml
        readOnly: true
  config-kubernetes:
    enabled: true
    type: configMap
    name: homepage
    globalMounts:
      - path: /app/config/kubernetes.yaml
        subPath: kubernetes.yaml
        readOnly: true
  config-docker:
    enabled: true
    type: configMap
    name: homepage
    globalMounts:
      - path: /app/config/docker.yaml
        subPath: docker.yaml
        readOnly: true
  config-css:
    enabled: true
    type: configMap
    name: homepage
    globalMounts:
      - path: /app/config/custom.css
        subPath: custom.css
        readOnly: true
  config-js:
    enabled: true
    type: configMap
    name: homepage
    globalMounts:
      - path: /app/config/custom.js
        subPath: custom.js
        readOnly: true
  logs:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /app/config/logs

apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
spec:
  template:
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: jellyfin
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    killall -SIGTERM ffmpeg 2>/dev/null
                    for i in $(seq 1 30); do
                      pgrep -x ffmpeg > /dev/null || break
                      sleep 2
                    done
                    sleep 5

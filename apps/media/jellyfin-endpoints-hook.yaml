---
# RBAC resources for the PostSync hook that creates Endpoints for the
# external Jellyfin VM.  These are regular ArgoCD-managed resources
# (no hook annotation) so they persist between syncs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jellyfin-endpoints-sync
  namespace: media
  labels:
    app.kubernetes.io/name: jellyfin-endpoints-sync
    app.kubernetes.io/component: external-service
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jellyfin-endpoints-writer
  namespace: media
  labels:
    app.kubernetes.io/name: jellyfin-endpoints-sync
    app.kubernetes.io/component: external-service
rules:
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jellyfin-endpoints-sync
  namespace: media
  labels:
    app.kubernetes.io/name: jellyfin-endpoints-sync
    app.kubernetes.io/component: external-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jellyfin-endpoints-writer
subjects:
  - kind: ServiceAccount
    name: jellyfin-endpoints-sync
    namespace: media
---
# PostSync hook: applies the Endpoints object that ArgoCD's global
# resource.exclusions prevents from being synced normally.
# See: https://github.com/mithr4ndir/k8s-argocd/issues/134
apiVersion: batch/v1
kind: Job
metadata:
  name: jellyfin-endpoints-sync
  namespace: media
  labels:
    app.kubernetes.io/name: jellyfin-endpoints-sync
    app.kubernetes.io/component: external-service
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jellyfin-endpoints-sync
        app.kubernetes.io/component: external-service
    spec:
      serviceAccountName: jellyfin-endpoints-sync
      automountServiceAccountToken: true
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: kubectl
          image: bitnami/kubectl:1.31
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          command:
            - /bin/sh
            - -c
            - |
              cat <<'MANIFEST' | kubectl apply -f -
              apiVersion: v1
              kind: Endpoints
              metadata:
                name: jellyfin
                namespace: media
                labels:
                  app.kubernetes.io/name: jellyfin
                  app.kubernetes.io/component: external-service
                  app.kubernetes.io/managed-by: argocd-postsync-hook
              subsets:
                - addresses:
                    - ip: 192.168.1.170
                  ports:
                    - port: 8096
                      protocol: TCP
              MANIFEST
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

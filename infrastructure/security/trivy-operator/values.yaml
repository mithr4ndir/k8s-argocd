trivy-operator:
  trivy:
    severity: CRITICAL,HIGH
    ignoreUnfixed: true

  operator:
    scanJobsConcurrentLimit: 3

  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

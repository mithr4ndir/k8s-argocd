external-secrets:
  installCRDs: true

  webhook:
    create: true

  certController:
    create: true

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  # Limit concurrent reconciles to prevent retry storms from
  # overwhelming upstream secret providers (1Password, Vault, etc.)
  concurrent: 1

---
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-custom-config
  namespace: monitoring
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity =~ warning|info
        equal: [namespace, alertname]
      - source_matchers:
          - severity = warning
        target_matchers:
          - severity = info
        equal: [namespace, alertname]
      - source_matchers:
          - alertname = InfoInhibitor
        target_matchers:
          - severity = info
        equal: [namespace]
      - target_matchers:
          - alertname = InfoInhibitor
    route:
      receiver: discord
      group_by: [namespace, alertname]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers:
            - alertname = "Watchdog"
          receiver: healthchecks
          group_wait: 0s
          group_interval: 1m
          repeat_interval: 2m
        - matchers:
            - alertname =~ "InfoInhibitor|KubeVersionMismatch"
          receiver: "null"
        - matchers:
            - alertname = "NodeDown"
          receiver: discord
          group_by: [hypervisor, alertname]
          group_wait: 1m
          repeat_interval: 1h
        - matchers:
            - alertname = "PveGuestDown"
          receiver: discord
          group_by: [alertname, node]
          group_wait: 1m
        - matchers:
            - alertname =~ "ServiceDown|ServiceInactive"
          receiver: discord
          group_by: [instance, alertname]
          group_wait: 1m
          repeat_interval: 1h
        - matchers:
            - alertname = "AnsiblePlaybookMadeChanges"
          receiver: discord
          group_by: [alertname]
          group_wait: 2m
          repeat_interval: 4h
        - matchers:
            - source = "falco"
          receiver: discord
          group_by: [rule, alertname]
          group_wait: 1m
          repeat_interval: 2h
        - matchers:
            - source = "wazuh"
          receiver: discord
          group_by: [alertname, instance]
          group_wait: 1m
          repeat_interval: 2h
        - matchers:
            - severity = critical
          receiver: discord
          repeat_interval: 1h
    receivers:
      - name: "null"
      - name: discord
        webhook_configs:
          - send_resolved: true
            url: "http://discord-alert-proxy.monitoring.svc:9095/webhook"
      - name: healthchecks
        webhook_configs:
          # HC.io expects ping requests (any GET/POST to the ping URL
          # is a liveness signal). send_resolved: true would cause
          # AlertManager to POST a resolved-alert JSON body that HC.io
          # does not interpret, and can show as a failed ping in the
          # event log. Keep this false.
          - send_resolved: false
            url_file: /etc/alertmanager/secrets/healthchecks-watchdog/url
            max_alerts: 0

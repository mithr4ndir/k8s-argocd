---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord-alert-proxy
  namespace: monitoring
  labels:
    app: discord-alert-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: discord-alert-proxy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: discord-alert-proxy
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      # system-cluster-critical keeps the alerter from being evicted
      # before the workloads it monitors under node memory pressure.
      # A PDB (pdb.yaml) prevents voluntary eviction but does not protect
      # against kubelet-level eviction, which is what this priority class
      # addresses.
      priorityClassName: system-cluster-critical
      # Soft pod anti-affinity keeps the two replicas on different nodes
      # when possible. Previously paired with a topologySpreadConstraint
      # expressing the same intent; dropped that to avoid two overlapping
      # declarations (both soft, so they did not conflict, but only one
      # is needed).
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: discord-alert-proxy
      containers:
        - name: proxy
          # Baked image (see Dockerfile + requirements.txt in this dir),
          # pinned by SHA tag so rollouts are deterministic. A refresh is
          # a new SHA tag + bump of this line via the build workflow.
          image: ghcr.io/mithr4ndir/discord-alert-proxy:c8a27162e0e0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9095
          env:
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: discord-webhook-url
                  key: webhook-url
          resources:
            requests:
              memory: 64Mi
              cpu: 10m
            limits:
              memory: 128Mi
              cpu: 100m
          livenessProbe:
            httpGet:
              path: /health
              port: 9095
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 9095
            initialDelaySeconds: 15
            periodSeconds: 10

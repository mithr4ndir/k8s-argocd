kube-prometheus-stack:
  # Prometheus configuration
  prometheus:
    prometheusSpec:
      retention: 15d
      additionalScrapeConfigs:
        - job_name: 'proxmox'
          metrics_path: /pve
          params:
            module: [default]
            cluster: ['1']
            node: ['1']
            target: ['localhost']
          static_configs:
            - targets:
              - '192.168.1.10:9221'
              - '192.168.1.11:9221'
        - job_name: 'vm-node-exporter'
          relabel_configs:
            - source_labels: [__address__]
              target_label: target_address
          file_sd_configs:
            - files:
                - /etc/prometheus/file_sd/vm-targets.json
              refresh_interval: 1m
      volumes:
        - name: file-sd-targets
          configMap:
            name: prometheus-file-sd-targets
      volumeMounts:
        - name: file-sd-targets
          mountPath: /etc/prometheus/file_sd
          readOnly: true
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: k8s-nfs
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
      externalLabels:
        cluster: quasarlab-k8s
      # Resource limits
      resources:
        requests:
          memory: 400Mi
          cpu: 200m
        limits:
          memory: 2Gi
          cpu: 1000m

  grafana:
    enabled: true
    image:
      tag: "12.4.1"

    # Server configuration
    grafana.ini:
      server:
        domain: graphy.herro.me
        root_url: https://graphy.herro.me
      database:
        type: postgres
        host: 192.168.1.123:5432
        name: grafana
        user: grafana
        ssl_mode: disable

    # PostgreSQL password from ExternalSecret
    envFromSecret: grafana-secrets

    # Auto-restart Grafana when the grafana-secrets Secret changes
    # (e.g. after a 1Password rotation + ESO re-sync). Without this,
    # Grafana keeps running with stale env vars until manual restart.
    podAnnotations:
      reloader.stakater.com/auto: "true"

    # Plugins
    plugins:
      - grafana-opensearch-datasource
      - marcusolsson-calendar-panel
      - neocat-cal-heatmap-panel

    # Datasources provisioned via sidecar
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: false
        jsonData:
          maxLines: 1000
      - name: Wazuh-OpenSearch
        type: grafana-opensearch-datasource
        access: proxy
        url: https://192.168.1.171:9200
        isDefault: false
        jsonData:
          database: "wazuh-alerts-*"
          flavor: opensearch
          version: "2.18.0"
          pplEnabled: true
          timeField: "timestamp"
          tlsSkipVerify: true
        secureJsonData:
          basicAuthPassword: $__env{WAZUH_OPENSEARCH_PASSWORD}
        basicAuth: true
        basicAuthUser: admin

    # Dashboard sidecar
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        folderAnnotation: grafana_folder
        provider:
          foldersFromFilesStructure: false
          allowUiUpdates: true

    # No persistent volume — PostgreSQL is the backend
    persistence:
      enabled: false

    # Service — reuse the old Grafana VM IP via MetalLB
    service:
      type: LoadBalancer

    # Resource limits
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m

  # Alertmanager configuration
  # Config secret is managed by ExternalSecret (alertmanager-external-secret.yaml)
  # pulling the Discord webhook URL from 1Password.
  alertmanager:
    enabled: true
    alertmanagerSpec:
      replicas: 2
      configSecret: alertmanager-custom-config
      secrets:
        - healthchecks-watchdog
      podAntiAffinity: "soft"
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: k8s-nfs
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 5Gi
      resources:
        requests:
          memory: 50Mi
          cpu: 10m
        limits:
          memory: 100Mi
          cpu: 100m

  # Node exporter disabled - already deployed via Ansible on k8s nodes
  nodeExporter:
    enabled: false

  # Kube state metrics for Kubernetes object metrics
  kubeStateMetrics:
    enabled: true

  # Scrape kubelet metrics
  kubelet:
    enabled: true

  # Disable scraping/rules for components that bind to 127.0.0.1 on kubeadm
  # and aren't reachable by default ServiceMonitors
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false

  # Custom alerting rules for hypervisors and VMs
  additionalPrometheusRulesMap:
    vm-node-alerts:
      groups:
        - name: node-availability
          rules:
            - alert: NodeDown
              expr: up{job="vm-node-exporter"} == 0
              for: 3m
              labels:
                severity: critical
              annotations:
                summary: "{{ $labels.instance }} is down"
                description: "Node exporter on {{ $labels.instance }} has been unreachable for 3 minutes."
        - name: node-resources
          rules:
            - alert: HighCpuUsage
              expr: (1 - avg by(instance) (rate(node_cpu_seconds_total{job="vm-node-exporter", mode="idle"}[5m]))) * 100 > 90
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "{{ $labels.instance }} CPU > 90%"
                description: "{{ $labels.instance }} CPU usage has been above 90% for 10 minutes (current: {{ $value | printf \"%.1f\" }}%)."
            - alert: HighMemoryUsage
              expr: (1 - node_memory_MemAvailable_bytes{job="vm-node-exporter", instance!="truenas"} / node_memory_MemTotal_bytes{job="vm-node-exporter", instance!="truenas"}) * 100 > 90
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "{{ $labels.instance }} memory > 90%"
                description: "{{ $labels.instance }} memory usage has been above 90% for 10 minutes (current: {{ $value | printf \"%.1f\" }}%)."
            - alert: TrueNasLowMemory
              expr: node_memory_MemAvailable_bytes{job="vm-node-exporter", instance="truenas"} < 2 * 1024 * 1024 * 1024
              for: 10m
              labels:
                severity: critical
              annotations:
                summary: "TrueNAS available memory < 2GB"
                description: "TrueNAS has only {{ $value | humanize1024 }}B available. ZFS ARC may not be releasing memory fast enough."
            - alert: DiskSpaceLow
              expr: (1 - node_filesystem_avail_bytes{job="vm-node-exporter", fstype=~"ext4|xfs|zfs", mountpoint!~"/boot.*"} / node_filesystem_size_bytes{job="vm-node-exporter", fstype=~"ext4|xfs|zfs", mountpoint!~"/boot.*"}) * 100 > 85
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "{{ $labels.instance }} disk > 85% on {{ $labels.mountpoint }}"
                description: "{{ $labels.instance }} filesystem {{ $labels.mountpoint }} is {{ $value | printf \"%.1f\" }}% full."
            - alert: DiskSpaceCritical
              expr: (1 - node_filesystem_avail_bytes{job="vm-node-exporter", fstype=~"ext4|xfs|zfs", mountpoint!~"/boot.*"} / node_filesystem_size_bytes{job="vm-node-exporter", fstype=~"ext4|xfs|zfs", mountpoint!~"/boot.*"}) * 100 > 95
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "{{ $labels.instance }} disk > 95% on {{ $labels.mountpoint }}"
                description: "{{ $labels.instance }} filesystem {{ $labels.mountpoint }} is {{ $value | printf \"%.1f\" }}% full. Immediate action required."
            - alert: HighSystemLoad
              expr: node_load15{job="vm-node-exporter"} / count without(cpu) (count without(mode) (node_cpu_seconds_total{job="vm-node-exporter", mode="idle"})) > 2
              for: 15m
              labels:
                severity: warning
              annotations:
                summary: "{{ $labels.instance }} load average is high"
                description: "{{ $labels.instance }} 15m load average is {{ $value | printf \"%.1f\" }}x the CPU count."
        - name: node-hardware
          rules:
            - alert: NetworkErrors
              expr: rate(node_network_receive_errs_total{job="vm-node-exporter", device!~"veth.*|cali.*|tunl.*"}[5m]) + rate(node_network_transmit_errs_total{job="vm-node-exporter", device!~"veth.*|cali.*|tunl.*"}[5m]) > 5
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "{{ $labels.instance }} network errors on {{ $labels.device }}"
                description: "{{ $labels.instance }} interface {{ $labels.device }} is seeing network errors ({{ $value | printf \"%.1f\" }}/s)."
            - alert: OOMKillDetected
              expr: increase(node_vmstat_oom_kill{job="vm-node-exporter"}[5m]) > 0
              labels:
                severity: warning
              annotations:
                summary: "OOM kill on {{ $labels.instance }}"
                description: "{{ $labels.instance }} had an OOM kill in the last 5 minutes."
    nfs-and-prometheus:
      groups:
        - name: nfs-health
          rules:
            - alert: NfsStaleMount
              expr: node_filesystem_readonly{job="vm-node-exporter", fstype="nfs4"} == 1
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "{{ $labels.instance }} NFS mount read-only on {{ $labels.mountpoint }}"
                description: "NFS mount {{ $labels.mountpoint }} on {{ $labels.instance }} is read-only, likely stale or TrueNAS unreachable."
            # NfsMountMissing removed: node_exporter reports device_error=1
            # for all NFS mounts (normal behavior) and skips avail_bytes,
            # causing absent_over_time to always fire. TrueNAS availability
            # is covered by the NodeDown alert on 192.168.1.15:9100.
    prometheus-self:
      groups:
        - name: prometheus-health
          rules:
            - alert: PrometheusTargetScrapeFailures
              expr: increase(prometheus_target_scrapes_sample_duplicate_timestamp_total[5m]) > 0 or increase(prometheus_target_scrapes_exceeded_body_size_limit_total[5m]) > 0
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "Prometheus scrape issues detected"
                description: "Prometheus is experiencing scrape errors (duplicates or body size exceeded)."
            - alert: PrometheusTsdbErrors
              expr: increase(prometheus_tsdb_compactions_failed_total[5m]) > 0 or increase(prometheus_tsdb_wal_corruptions_total[5m]) > 0
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "Prometheus TSDB errors"
                description: "Prometheus storage is experiencing compaction failures or WAL corruption."
            - alert: PrometheusRuleEvalFailures
              expr: increase(prometheus_rule_evaluation_failures_total[5m]) > 0
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "Prometheus rule evaluation failures"
                description: "Prometheus is failing to evaluate alerting/recording rules."
            - alert: PrometheusNotificationsDropped
              expr: rate(prometheus_notifications_dropped_total[5m]) > 0
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "Prometheus is dropping notifications to AlertManager"
                description: "Prometheus has been dropping alert notifications for 5 minutes. AlertManager may be unreachable. Current rate: {{ $value | printf \"%.2f\" }}/s."
    proxmox-alerts:
      groups:
        - name: proxmox-availability
          rules:
            - alert: PveExporterDown
              expr: up{job="proxmox"} == 0
              for: 3m
              labels:
                severity: critical
              annotations:
                summary: "PVE exporter unreachable at {{ $labels.instance }}"
                description: "Proxmox exporter {{ $labels.instance }} has been down for 3 minutes."
            - alert: PveGuestDown
              # The tags label is a semicolon-delimited list from Proxmox
              # (e.g. "linux;services;no-alert"). Anchor on the separators
              # so tag names like 'no-alert-policy' or 'preventive-maintenance'
              # do NOT silently suppress alerts.
              expr: |
                (
                  (pve_up{job="proxmox", id=~"qemu/.*"} == 0)
                  and on(id, instance)
                  (pve_onboot_status{job="proxmox"} == 1)
                )
                * on(id, instance) group_left(name, node, tags)
                (pve_guest_info{job="proxmox", template="0", tags!~"(.*;)?(no-alert|maintenance)(;.*)?"})
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "{{ $labels.name }} ({{ $labels.id }})"
                description: |
                  VM {{ $labels.name }} ({{ $labels.id }}) on {{ $labels.node }} has onboot=1 but is not running. To silence: `qm set {{ $labels.id | reReplaceAll "^qemu/" "" }} --tags <existing>,no-alert` (permanent) or `,maintenance` (temporary).
                runbook_url: "https://github.com/mithr4ndir/k8s-argocd/blob/main/infrastructure/monitoring/kube-prometheus-stack/values.yaml#PveGuestDown"
            - alert: PveGuestMaintenanceTagStale
              # Same anchored-separator match as PveGuestDown so we don't
              # warn on harmless tags that happen to contain the substring.
              expr: |
                pve_guest_info{job="proxmox", template="0", tags=~"(.*;)?maintenance(;.*)?"}
              for: 24h
              labels:
                severity: info
              annotations:
                summary: "{{ $labels.name }} still tagged 'maintenance' after 24h"
                description: |
                  VM {{ $labels.name }} ({{ $labels.id }}) on {{ $labels.node }} has been tagged 'maintenance' for over 24 hours. Remove with `qm set {{ $labels.id | reReplaceAll "^qemu/" "" }} --tags <existing tags without maintenance>` or this VM stays silently excluded from PveGuestDown.
                runbook_url: "https://github.com/mithr4ndir/k8s-argocd/blob/main/infrastructure/monitoring/kube-prometheus-stack/values.yaml#PveGuestMaintenanceTagStale"
            - alert: PveQuorumDegraded
              expr: pve_cluster_quorum_total_votes{job="vm-node-exporter"} < pve_cluster_quorum_expected_votes{job="vm-node-exporter"}
              for: 2m
              labels:
                severity: warning
              annotations:
                summary: "PVE cluster quorum degraded on {{ $labels.instance }}"
                description: "Cluster has {{ $value }} votes, expected {{ printf `pve_cluster_quorum_expected_votes{instance=\"%s\"}` $labels.instance | query | first | value }}. A node or qdevice may be down."
            - alert: PveQuorumLost
              expr: pve_cluster_quorum_quorate{job="vm-node-exporter"} == 0
              for: 1m
              labels:
                severity: critical
              annotations:
                summary: "PVE cluster has LOST quorum on {{ $labels.instance }}"
                description: "Cluster is no longer quorate. HA operations are blocked."
        - name: proxmox-resources
          rules:
            - alert: PveHighCpu
              expr: pve_cpu_usage_ratio{job="proxmox", id=~"node/.*"} > 0.9
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "PVE host {{ $labels.id }} CPU > 90%"
                description: "Proxmox host CPU is at {{ $value | humanizePercentage }}."
            - alert: PveHighMemory
              expr: pve_memory_usage_bytes{job="proxmox", id=~"node/.*"} / pve_memory_size_bytes{job="proxmox", id=~"node/.*"} > 0.9
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "PVE host {{ $labels.id }} memory > 90%"
                description: "Proxmox host memory usage is above 90%."
            - alert: PveStorageHigh
              expr: pve_disk_usage_bytes{job="proxmox", id=~"storage/.*"} / pve_disk_size_bytes{job="proxmox", id=~"storage/.*"} > 0.85
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "PVE storage {{ $labels.id }} > 85%"
                description: "Proxmox storage {{ $labels.id }} is above 85% capacity."

    etcd-health:
      groups:
        - name: etcd-database
          rules:
            - alert: EtcdDbSizeLarge
              expr: etcd_mvcc_db_total_size_in_bytes > 100e6
              for: 1h
              labels:
                severity: warning
              annotations:
                summary: "etcd db {{ $labels.pod }} is {{ $value | humanize1024 }}"
                description: "etcd member {{ $labels.pod }} has a database larger than 100MB for over 1 hour. Run compaction + defragmentation to reclaim space before the db causes leader election instability. See 2026-04-18 RCA."
            - alert: EtcdDbSizeCritical
              expr: etcd_mvcc_db_total_size_in_bytes > 200e6
              for: 15m
              labels:
                severity: critical
              annotations:
                summary: "etcd db {{ $labels.pod }} is {{ $value | humanize1024 }} (critical)"
                description: "etcd member {{ $labels.pod }} has a database larger than 200MB. This caused controller-manager crash-loops in the 2026-04-18 incident at 124MB. Immediate compaction + defrag required."

    onepassword-quota:
      groups:
        - name: onepassword-quota
          rules:
            # Account-tier daily cap (Families plan: 1000 reads/day, shared across all service accounts).
            # The 2026-04-18 incident pinned this for ~24h and silently broke every ExternalSecret sync.
            # See ansible-quasarlab roles/op_quota_collector for the textfile source.
            - alert: OnePasswordQuotaHalfConsumed
              expr: onepassword_ratelimit_remaining{type="account",action="read_write"} < 500
              for: 15m
              labels:
                severity: info
              annotations:
                summary: "1Password account quota at 50% ({{ $value }} remaining)"
                description: "1Password daily account cap has dropped below 500/1000 remaining for 15m. Trend check: identify heaviest consumers before they push us toward critical."
                runbook_url: "https://github.com/mithr4ndir/k8s-argocd/blob/main/docs/runbooks/onepassword-quota.md"
            - alert: OnePasswordQuotaLow
              expr: onepassword_ratelimit_remaining{type="account",action="read_write"} < 200
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "1Password account quota low ({{ $value }} remaining)"
                description: "1Password daily account cap has dropped below 200/1000 remaining for 10m. Intervene now: pause non-critical automation or widen ESO refresh intervals. Reset in {{ with query \"onepassword_ratelimit_reset_seconds{type='account'}\" }}{{ . | first | value | humanizeDuration }}{{ end }}."
                runbook_url: "https://github.com/mithr4ndir/k8s-argocd/blob/main/docs/runbooks/onepassword-quota.md"
            - alert: OnePasswordQuotaCritical
              expr: onepassword_ratelimit_remaining{type="account",action="read_write"} < 50
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "1Password account quota CRITICAL ({{ $value }} remaining)"
                description: "1Password daily account cap has dropped below 50/1000 remaining. Secrets are about to stop syncing. Trip the kill switch and scale ESO to 0 until reset."
                runbook_url: "https://github.com/mithr4ndir/k8s-argocd/blob/main/docs/runbooks/onepassword-quota.md"
            - alert: OnePasswordQuotaExhausted
              expr: onepassword_ratelimit_remaining{type="account",action="read_write"} == 0
              for: 0m
              labels:
                severity: critical
              annotations:
                summary: "1Password account quota EXHAUSTED"
                description: "1Password daily account cap is fully consumed. Every `op` call will 429 until reset. ExternalSecret sync is broken. Trip kill switch, scale ESO to 0, wait for reset window."
                runbook_url: "https://github.com/mithr4ndir/k8s-argocd/blob/main/docs/runbooks/onepassword-quota.md"
            # Collector staleness: distinct from "quota is fine" so operator can tell measurement failure
            # apart from a healthy cluster.
            - alert: OnePasswordQuotaCollectorStale
              expr: onepassword_ratelimit_collector_success == 0
              for: 30m
              labels:
                severity: warning
              annotations:
                summary: "1Password quota collector failing on {{ $labels.instance }}"
                description: "op-quota-collector has been reporting success=0 for 30m. Quota metrics are stale. Check `journalctl -t op-quota-collector -n 50` on the host. Common causes: kill switch tripped, token unreadable, `op` CLI missing."
                runbook_url: "https://github.com/mithr4ndir/k8s-argocd/blob/main/docs/runbooks/onepassword-quota.md"

    wazuh-health:
      groups:
        - name: wazuh-services
          rules:
            - alert: WazuhManagerDown
              expr: node_systemd_unit_state{job="vm-node-exporter", name="wazuh-manager.service", state="active"} == 0
              for: 3m
              labels:
                severity: critical
              annotations:
                summary: "Wazuh Manager is down on {{ $labels.instance }}"
                description: "wazuh-manager.service is not active on {{ $labels.instance }} for 3 minutes. Security monitoring is offline."
            - alert: WazuhIndexerDown
              expr: node_systemd_unit_state{job="vm-node-exporter", name="wazuh-indexer.service", state="active"} == 0
              for: 3m
              labels:
                severity: critical
              annotations:
                summary: "Wazuh Indexer is down on {{ $labels.instance }}"
                description: "wazuh-indexer.service is not active on {{ $labels.instance }}. Alert indexing is offline."
            - alert: WazuhDashboardDown
              expr: node_systemd_unit_state{job="vm-node-exporter", name="wazuh-dashboard.service", state="active"} == 0
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "Wazuh Dashboard is down on {{ $labels.instance }}"
                description: "wazuh-dashboard.service is not active on {{ $labels.instance }}."
            - alert: WazuhFilebeatDown
              expr: node_systemd_unit_state{job="vm-node-exporter", name="filebeat.service", state="active"} == 0
              for: 3m
              labels:
                severity: warning
              annotations:
                summary: "Filebeat is down on {{ $labels.instance }}"
                description: "filebeat.service is not active on {{ $labels.instance }}. Wazuh alerts are not being shipped to the indexer."

    system-updates:
      groups:
        - name: unattended-upgrades
          rules:
            - alert: RebootRequired
              expr: node_reboot_required{job="vm-node-exporter"} == 1
              for: 30m
              labels:
                severity: warning
              annotations:
                summary: "{{ $labels.instance }} requires a reboot"
                description: "{{ $labels.instance }} has pending updates that require a reboot."
            - alert: UnattendedUpgradesFailed
              expr: unattended_upgrades_success{job="vm-node-exporter"} == 0
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "{{ $labels.instance }} unattended-upgrades failed"
                description: "Automatic security updates failed on {{ $labels.instance }}. Check /var/log/unattended-upgrades/."
            - alert: SecurityUpdatesPending
              expr: unattended_upgrades_pending_security{job="vm-node-exporter"} > 0
              for: 24h
              labels:
                severity: warning
              annotations:
                summary: "{{ $labels.instance }} has {{ $value }} pending security updates"
                description: "{{ $labels.instance }} has had pending security updates for over 24 hours."

    service-down-alerts:
      groups:
        - name: service-health
          rules:
            - alert: ServiceDown
              expr: node_systemd_unit_state{job="vm-node-exporter", state="failed"} == 1
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "{{ $labels.name }} is down on {{ $labels.instance }}"
                description: "Systemd unit {{ $labels.name }} has been in failed state on {{ $labels.instance }} for 2 minutes."
            - alert: ServiceInactive
              expr: node_systemd_unit_state{job="vm-node-exporter", state="active"} == 0 and ignoring(state) node_systemd_unit_state{job="vm-node-exporter", state="failed"} == 0
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "{{ $labels.name }} is not running on {{ $labels.instance }}"
                description: "Systemd unit {{ $labels.name }} on {{ $labels.instance }} is not in active or failed state for 5 minutes."

    ansible-automation:
      groups:
        - name: ansible-timer
          rules:
            - alert: AnsiblePlaybookFailed
              expr: ansible_playbook_success{job="vm-node-exporter"} == 0
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "{{ $labels.playbook }} failed — hosts: {{ $labels.failed_hosts }}"
                description: "Playbook {{ $labels.playbook }} failed on hosts: {{ $labels.failed_hosts }}. Check /var/log/ansible-quasarlab/ on {{ $labels.instance }}."
            - alert: AnsibleRunStale
              expr: time() - ansible_run_timestamp_seconds{job="vm-node-exporter"} > 3600
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "Ansible timer hasn't run in over 1 hour on {{ $labels.instance }}"
                description: "Last ansible run was {{ $value | humanizeDuration }} ago on {{ $labels.instance }} ({{ $labels.target_address }}). The systemd timer may be stopped or stuck."
            - alert: AnsiblePlaybookMadeChanges
              expr: sum by (playbook) (ansible_playbook_changed_tasks{job="vm-node-exporter"}) > 0
              for: 5m
              labels:
                severity: info
              annotations:
                summary: "{{ $labels.playbook }} made changes"
                description: "Playbook {{ $labels.playbook }} has had changed tasks for over 5 minutes. Check /var/log/ansible-quasarlab/ for details."
            - alert: AnsibleSecurityRunStale
              expr: time() - ansible_security_run_timestamp_seconds{job="vm-node-exporter"} > 3600
              for: 10m
              labels:
                severity: critical
              annotations:
                summary: "Security enforcement hasn't run in over 1 hour on {{ $labels.instance }}"
                description: "Last security timer run was {{ $value | humanizeDuration }} ago on {{ $labels.instance }}. Wazuh/CrowdSec config enforcement is not converging."

    media-service-health:
      groups:
        - name: media-services
          rules:
            - alert: MediaDeploymentUnavailable
              expr: |
                kube_deployment_status_replicas_available{namespace="media"} == 0
                and
                kube_deployment_spec_replicas{namespace="media"} > 0
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "{{ $labels.deployment }} has been down for 5 minutes"
                description: "Deployment {{ $labels.deployment }} in namespace {{ $labels.namespace }} has 0 available replicas. The service is completely offline."
            - alert: MediaPodCrashLooping
              expr: |
                increase(kube_pod_container_status_restarts_total{namespace="media"}[1h]) > 5
                and on (namespace, pod)
                kube_pod_status_phase{namespace="media", phase="Running"} == 1
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "{{ $labels.pod }} is crash-looping ({{ $value | printf \"%.0f\" }} restarts/hr)"
                description: "Container {{ $labels.container }} in pod {{ $labels.pod }} has restarted more than 5 times in the last hour. Check logs with: kubectl logs -n media {{ $labels.pod }} -c {{ $labels.container }} --previous"
            - alert: MediaPodNotReady
              expr: |
                min by (namespace, pod) (
                  kube_pod_status_ready{namespace="media", condition="true"}
                ) == 0
                and on (namespace, pod)
                kube_pod_status_phase{namespace="media", phase="Running"} == 1
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "{{ $labels.pod }} not ready for 10+ minutes"
                description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been running but not ready for over 10 minutes. Readiness probes may be failing."

  # Prometheus Operator
  prometheusOperator:
    enabled: true
    resources:
      requests:
        memory: 100Mi
        cpu: 50m
      limits:
        memory: 200Mi
        cpu: 200m

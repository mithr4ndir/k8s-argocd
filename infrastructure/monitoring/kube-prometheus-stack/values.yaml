kube-prometheus-stack:
  # Prometheus configuration
  prometheus:
    prometheusSpec:
      retention: 15d
      additionalScrapeConfigs:
        - job_name: 'proxmox'
          metrics_path: /pve
          params:
            module: [default]
            cluster: ['1']
            node: ['1']
            target: ['localhost']
          static_configs:
            - targets:
              - '192.168.1.10:9221'
              - '192.168.1.11:9221'
        - job_name: 'vm-node-exporter'
          static_configs:
            # pve2 VMs
            - targets: ['192.168.1.88:9100']
              labels:
                instance: cmd_center1
                hypervisor: pve2
            - targets: ['192.168.1.89:9100']
              labels:
                instance: k8cluster2
                hypervisor: pve2
            # pve VMs
            - targets: ['192.168.1.90:9100']
              labels:
                instance: k8cluster1
                hypervisor: pve
            - targets: ['192.168.1.91:9100']
              labels:
                instance: k8cluster3
                hypervisor: pve
            - targets: ['192.168.1.92:9100']
              labels:
                instance: nginx1
                hypervisor: pve
            - targets: ['192.168.1.93:9100']
              labels:
                instance: nginx2
                hypervisor: pve
            - targets: ['192.168.1.121:9100']
              labels:
                instance: grafana
                hypervisor: pve
            - targets: ['192.168.1.167:9100']
              labels:
                instance: elastic
                hypervisor: pve
            - targets: ['192.168.1.122:9100']
              labels:
                instance: timescaledb
                hypervisor: pve
            - targets: ['192.168.1.150:9100']
              labels:
                instance: npm
                hypervisor: pve
            # Bare-metal PVE hosts (not VMs)
            - targets: ['192.168.1.10:9100']
              labels:
                instance: pve
            - targets: ['192.168.1.11:9100']
              labels:
                instance: pve2
            # NAS
            - targets: ['192.168.1.15:9100']
              labels:
                instance: truenas
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: k8s-nfs
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
      externalLabels:
        cluster: quasarlab-k8s
      # Resource limits
      resources:
        requests:
          memory: 400Mi
          cpu: 200m
        limits:
          memory: 2Gi
          cpu: 1000m

  # Disable Grafana - using external Grafana VM at 192.168.1.121
  grafana:
    enabled: false

  # Alertmanager configuration
  # Full config (routes, receivers, Discord webhook) lives in a manually-managed
  # K8s secret to keep the webhook URL out of this public repo.
  # See: kubectl get secret alertmanager-custom-config -n monitoring
  alertmanager:
    enabled: true
    alertmanagerSpec:
      configSecret: alertmanager-custom-config
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: k8s-nfs
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 5Gi
      resources:
        requests:
          memory: 50Mi
          cpu: 10m
        limits:
          memory: 100Mi
          cpu: 100m

  # Node exporter disabled - already deployed via Ansible on k8s nodes
  nodeExporter:
    enabled: false

  # Kube state metrics for Kubernetes object metrics
  kubeStateMetrics:
    enabled: true

  # Scrape kubelet metrics
  kubelet:
    enabled: true

  # Disable scraping/rules for components that bind to 127.0.0.1 on kubeadm
  # and aren't reachable by default ServiceMonitors
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false

  # Custom alerting rules for hypervisors and VMs
  additionalPrometheusRulesMap:
    vm-node-alerts:
      groups:
        - name: node-availability
          rules:
            - alert: NodeDown
              expr: up{job="vm-node-exporter"} == 0
              for: 3m
              labels:
                severity: critical
              annotations:
                summary: "{{ $labels.instance }} is down"
                description: "Node exporter on {{ $labels.instance }} has been unreachable for 3 minutes."
        - name: node-resources
          rules:
            - alert: HighCpuUsage
              expr: (1 - avg by(instance) (rate(node_cpu_seconds_total{job="vm-node-exporter", mode="idle"}[5m]))) * 100 > 90
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "{{ $labels.instance }} CPU > 90%"
                description: "{{ $labels.instance }} CPU usage has been above 90% for 10 minutes (current: {{ $value | printf \"%.1f\" }}%)."
            - alert: HighMemoryUsage
              expr: (1 - node_memory_MemAvailable_bytes{job="vm-node-exporter"} / node_memory_MemTotal_bytes{job="vm-node-exporter"}) * 100 > 90
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "{{ $labels.instance }} memory > 90%"
                description: "{{ $labels.instance }} memory usage has been above 90% for 10 minutes (current: {{ $value | printf \"%.1f\" }}%)."
            - alert: DiskSpaceLow
              expr: (1 - node_filesystem_avail_bytes{job="vm-node-exporter", fstype=~"ext4|xfs|zfs", mountpoint!~"/boot.*"} / node_filesystem_size_bytes{job="vm-node-exporter", fstype=~"ext4|xfs|zfs", mountpoint!~"/boot.*"}) * 100 > 85
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "{{ $labels.instance }} disk > 85% on {{ $labels.mountpoint }}"
                description: "{{ $labels.instance }} filesystem {{ $labels.mountpoint }} is {{ $value | printf \"%.1f\" }}% full."
            - alert: DiskSpaceCritical
              expr: (1 - node_filesystem_avail_bytes{job="vm-node-exporter", fstype=~"ext4|xfs|zfs", mountpoint!~"/boot.*"} / node_filesystem_size_bytes{job="vm-node-exporter", fstype=~"ext4|xfs|zfs", mountpoint!~"/boot.*"}) * 100 > 95
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "{{ $labels.instance }} disk > 95% on {{ $labels.mountpoint }}"
                description: "{{ $labels.instance }} filesystem {{ $labels.mountpoint }} is {{ $value | printf \"%.1f\" }}% full. Immediate action required."
            - alert: HighSystemLoad
              expr: node_load15{job="vm-node-exporter"} / count without(cpu) (count without(mode) (node_cpu_seconds_total{job="vm-node-exporter", mode="idle"})) > 2
              for: 15m
              labels:
                severity: warning
              annotations:
                summary: "{{ $labels.instance }} load average is high"
                description: "{{ $labels.instance }} 15m load average is {{ $value | printf \"%.1f\" }}x the CPU count."
        - name: node-hardware
          rules:
            - alert: NetworkErrors
              expr: rate(node_network_receive_errs_total{job="vm-node-exporter", device!~"veth.*|cali.*|tunl.*"}[5m]) + rate(node_network_transmit_errs_total{job="vm-node-exporter", device!~"veth.*|cali.*|tunl.*"}[5m]) > 5
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "{{ $labels.instance }} network errors on {{ $labels.device }}"
                description: "{{ $labels.instance }} interface {{ $labels.device }} is seeing network errors ({{ $value | printf \"%.1f\" }}/s)."
            - alert: OOMKillDetected
              expr: increase(node_vmstat_oom_kill{job="vm-node-exporter"}[5m]) > 0
              labels:
                severity: warning
              annotations:
                summary: "OOM kill on {{ $labels.instance }}"
                description: "{{ $labels.instance }} had an OOM kill in the last 5 minutes."
    nfs-and-prometheus:
      groups:
        - name: nfs-health
          rules:
            - alert: NfsStaleMount
              expr: node_filesystem_readonly{job="vm-node-exporter", fstype="nfs4"} == 1
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "{{ $labels.instance }} NFS mount read-only on {{ $labels.mountpoint }}"
                description: "NFS mount {{ $labels.mountpoint }} on {{ $labels.instance }} is read-only, likely stale or TrueNAS unreachable."
            - alert: NfsMountMissing
              expr: absent_over_time(node_filesystem_avail_bytes{job="vm-node-exporter", instance=~"k8cluster.*", fstype="nfs4"}[10m])
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "NFS mounts missing from K8s nodes"
                description: "No NFS filesystem metrics from K8s nodes for 10 minutes. TrueNAS may be unreachable."
    prometheus-self:
      groups:
        - name: prometheus-health
          rules:
            - alert: PrometheusTargetScrapeFailures
              expr: increase(prometheus_target_scrapes_sample_duplicate_timestamp_total[5m]) > 0 or increase(prometheus_target_scrapes_exceeded_body_size_limit_total[5m]) > 0
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "Prometheus scrape issues detected"
                description: "Prometheus is experiencing scrape errors (duplicates or body size exceeded)."
            - alert: PrometheusTsdbErrors
              expr: increase(prometheus_tsdb_compactions_failed_total[5m]) > 0 or increase(prometheus_tsdb_wal_corruptions_total[5m]) > 0
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "Prometheus TSDB errors"
                description: "Prometheus storage is experiencing compaction failures or WAL corruption."
            - alert: PrometheusRuleEvalFailures
              expr: increase(prometheus_rule_evaluation_failures_total[5m]) > 0
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "Prometheus rule evaluation failures"
                description: "Prometheus is failing to evaluate alerting/recording rules."
    proxmox-alerts:
      groups:
        - name: proxmox-availability
          rules:
            - alert: PveExporterDown
              expr: up{job="proxmox"} == 0
              for: 3m
              labels:
                severity: critical
              annotations:
                summary: "PVE exporter unreachable at {{ $labels.instance }}"
                description: "Proxmox exporter {{ $labels.instance }} has been down for 3 minutes."
            - alert: PveGuestDown
              expr: |
                (
                  (pve_up{job="proxmox", id=~"qemu/.*"} == 0)
                  and on(id, instance)
                  (pve_onboot_status{job="proxmox"} == 1)
                )
                * on(id, instance) group_left(name, node)
                (pve_guest_info{job="proxmox", template="0"})
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "VM {{ $labels.name }} is down on {{ $labels.node }}"
                description: "VM {{ $labels.name }} ({{ $labels.id }}) should be running (onboot=1) but has been stopped for 5 minutes."
        - name: proxmox-resources
          rules:
            - alert: PveHighCpu
              expr: pve_cpu_usage_ratio{job="proxmox", id=~"node/.*"} > 0.9
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "PVE host {{ $labels.id }} CPU > 90%"
                description: "Proxmox host CPU is at {{ $value | humanizePercentage }}."
            - alert: PveHighMemory
              expr: pve_memory_usage_bytes{job="proxmox", id=~"node/.*"} / pve_memory_size_bytes{job="proxmox", id=~"node/.*"} > 0.9
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "PVE host {{ $labels.id }} memory > 90%"
                description: "Proxmox host memory usage is above 90%."
            - alert: PveStorageHigh
              expr: pve_disk_usage_bytes{job="proxmox", id=~"storage/.*"} / pve_disk_size_bytes{job="proxmox", id=~"storage/.*"} > 0.85
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "PVE storage {{ $labels.id }} > 85%"
                description: "Proxmox storage {{ $labels.id }} is above 85% capacity."

  # Prometheus Operator
  prometheusOperator:
    enabled: true
    resources:
      requests:
        memory: 100Mi
        cpu: 50m
      limits:
        memory: 200Mi
        cpu: 200m

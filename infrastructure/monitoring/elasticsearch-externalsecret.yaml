---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: elasticsearch-credentials
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-infrastructure
    kind: ClusterSecretStore
  target:
    name: elasticsearch-credentials
  data:
    - secretKey: username
      remoteRef:
        key: "Elasticsearch - Grafana User"
        property: username
    - secretKey: password
      remoteRef:
        key: "Elasticsearch - Grafana User"
        property: password

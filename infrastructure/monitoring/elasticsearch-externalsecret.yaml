---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: elasticsearch-credentials
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-infrastructure
    kind: ClusterSecretStore
  target:
    name: elasticsearch-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        # 1Password item: "Elasticsearch - Grafana User"
        key: "tdrfzz3fgjyttrl7uj2mtlqbvi/username"
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: password
      remoteRef:
        # 1Password item: "Elasticsearch - Grafana User"
        key: "tdrfzz3fgjyttrl7uj2mtlqbvi/password"
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

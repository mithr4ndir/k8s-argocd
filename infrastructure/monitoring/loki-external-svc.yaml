apiVersion: v1
kind: Service
metadata:
  name: loki-external
  namespace: monitoring
  labels:
    app: loki-external
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.1.231
  ports:
    - port: 3100
      targetPort: 3100
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: loki
    app.kubernetes.io/component: single-binary

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-custom-config
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-infrastructure
    kind: ClusterSecretStore
  target:
    name: alertmanager-custom-config
    template:
      engineVersion: v2
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
          inhibit_rules:
            - source_matchers:
                - severity = critical
              target_matchers:
                - severity =~ warning|info
              equal: [namespace, alertname]
            - source_matchers:
                - severity = warning
              target_matchers:
                - severity = info
              equal: [namespace, alertname]
            - source_matchers:
                - alertname = InfoInhibitor
              target_matchers:
                - severity = info
              equal: [namespace]
            - target_matchers:
                - alertname = InfoInhibitor
          route:
            receiver: discord
            group_by: [namespace, alertname]
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            routes:
              - matchers:
                  - alertname = "Watchdog"
                receiver: "null"
              - matchers:
                  - alertname =~ "InfoInhibitor|KubeVersionMismatch"
                receiver: "null"
              - matchers:
                  - alertname = "NodeDown"
                receiver: discord
                group_by: [hypervisor, alertname]
                group_wait: 1m
                repeat_interval: 1h
              - matchers:
                  - alertname = "PveGuestDown"
                receiver: discord
                group_by: [alertname, node]
                group_wait: 1m
              - matchers:
                  - severity = critical
                receiver: discord
                repeat_interval: 1h
          receivers:
            - name: "null"
            - name: discord
              discord_configs:
                - send_resolved: true
                  webhook_url: "{{ .discord_webhook_url }}"
                  title: '{{ "{{" }} .Status | toUpper {{ "}}" }} ({{ "{{" }} .Alerts | len {{ "}}" }}) {{ "{{" }} .CommonLabels.alertname {{ "}}" }}{{ "{{" }} if .CommonLabels.node {{ "}}" }} on {{ "{{" }} .CommonLabels.node {{ "}}" }}{{ "{{" }} end {{ "}}" }}{{ "{{" }} if .CommonLabels.hypervisor {{ "}}" }} on {{ "{{" }} .CommonLabels.hypervisor {{ "}}" }}{{ "{{" }} end {{ "}}" }}{{ "{{" }} if .CommonLabels.severity {{ "}}" }} [{{ "{{" }} .CommonLabels.severity {{ "}}" }}]{{ "{{" }} end {{ "}}" }}'
                  message: |-
                    {{ "{{" }} range .Alerts {{ "}}" }}• {{ "{{" }} if .Annotations.summary {{ "}}" }}{{ "{{" }} .Annotations.summary {{ "}}" }}{{ "{{" }} else {{ "}}" }}{{ "{{" }} .Labels.instance {{ "}}" }}{{ "{{" }} end {{ "}}" }}
                    {{ "{{" }} end {{ "}}" }}
  data:
    - secretKey: discord_webhook_url
      remoteRef:
        # 1Password item: "Discord Webhook - Alertmanager"
        key: "vausmfy2q2m57r6scvziyrc7lq/credential"

loki:
  deploymentMode: SingleBinary

  loki:
    auth_enabled: false

    commonConfig:
      replication_factor: 1

    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    storage:
      type: filesystem

    limits_config:
      retention_period: 720h
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
      max_query_series: 500
      max_query_parallelism: 2

    compactor:
      working_directory: /var/loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150

  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
    persistence:
      enabled: true
      storageClass: k8s-nfs
      size: 50Gi

  # Disable components not needed in SingleBinary mode
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

  gateway:
    enabled: false

  chunksCache:
    enabled: false

  resultsCache:
    enabled: false

  lokiCanary:
    enabled: false

  test:
    enabled: false

  monitoring:
    selfMonitoring:
      enabled: false
    lokiCanary:
      enabled: false

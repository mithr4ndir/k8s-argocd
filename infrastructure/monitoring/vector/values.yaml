vector:
  role: Agent

  service:
    enabled: false

  serviceHeadless:
    enabled: false

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

  customConfig:
    data_dir: /vector-data-dir

    sources:
      kubernetes_logs:
        type: kubernetes_logs
        extra_namespace_label_selector: "kubernetes.io/metadata.name notin (kube-system,monitoring)"

    transforms:
      k8s_remap:
        type: remap
        inputs:
          - kubernetes_logs
        source: |
          .job = "kubernetes"
          .namespace = .kubernetes.pod_namespace
          .pod = .kubernetes.pod_name
          .container = .kubernetes.container_name
          .app = to_string(.kubernetes.pod_labels."app.kubernetes.io/name") ?? to_string(.kubernetes.pod_labels.app) ?? "unknown"
          del(.kubernetes)
          del(.file)
          del(.source_type)

    sinks:
      loki:
        type: loki
        inputs:
          - k8s_remap
        endpoint: http://loki.monitoring.svc.cluster.local:3100
        encoding:
          codec: json
        labels:
          job: '{{ "{{job}}" }}'
          namespace: '{{ "{{namespace}}" }}'
          pod: '{{ "{{pod}}" }}'
          container: '{{ "{{container}}" }}'
          app: '{{ "{{app}}" }}'
        remove_label_fields: true
        out_of_order_action: accept
